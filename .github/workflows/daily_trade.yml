name: Daily Trade Job

on:
  schedule:
    # 21:30 UTC = 5:30 PM ET, one hour after the 4 PM ET NYSE close.
    - cron: '30 21 * * 1-5'   # weekdays only
  workflow_dispatch:           # allow manual trigger from the GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK VADER lexicon
        run: python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Run daily job
        env:
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     ${{ secrets.ALPACA_BASE_URL }}
          DB_URL:              ${{ secrets.DB_URL }}
          NEWS_API_KEY:        ${{ secrets.NEWS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LIVE_TRADING:        ${{ secrets.LIVE_TRADING }}
          # Optional: enables Claude sentiment + narration. Without it the
          # job falls back to VADER and a templated summary (never crashes).
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_MODEL:           ${{ secrets.LLM_MODEL }}
        run: python -m jobs.daily_job
